<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Allocation Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: #f5f5f5;
      color: #222;
      font-size: 14px;
    }
    header {
      background: #fff;
      border-bottom: 1px solid #ddd;
      padding: 12px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    header h1 { font-size: 17px; font-weight: 600; color: #111; }
    header span.subtitle { font-size: 12px; color: #888; }
    .main { padding: 20px 24px 40px; }
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #aaa;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Portfolio Allocation Engine</h1>
      <span class="subtitle">Interactive Asset Analysis &amp; Optimization</span>
    </div>
  </header>
  <div class="main">
    <div class="empty">No data loaded. Add tickers and click Load Data.</div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Portfolio Allocation Engine</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #f5f5f5; color: #222; font-size: 14px; }

    header {
      background: #fff; border-bottom: 1px solid #ddd; padding: 12px 24px;
      display: flex; align-items: center; gap: 16px;
      position: sticky; top: 0; z-index: 50;
    }
    header h1 { font-size: 17px; font-weight: 600; color: #111; }
    header span.subtitle { font-size: 12px; color: #888; }

    /* Status dot */
    .header-status { margin-left: auto; display: flex; align-items: center; gap: 6px; font-size: 12px; color: #888; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ccc; }
    .dot.ready { background: #22c55e; }
    .dot.loading { background: #f59e0b; animation: blink 1s infinite; }
    .dot.error { background: #ef4444; }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

    /* Tabs */
    .tabs { background: #fff; border-bottom: 1px solid #ddd; display: flex; padding: 0 24px; }
    .tab-btn {
      padding: 10px 18px; font-size: 13px; font-weight: 500; color: #666;
      border: none; background: none; cursor: pointer;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      transition: color .15s, border-color .15s; font-family: inherit;
    }
    .tab-btn:hover { color: #222; }
    .tab-btn.active { color: #2563eb; border-bottom-color: #2563eb; }

    /* Controls bar */
    .controls-bar {
      background: #fff; border-bottom: 1px solid #ddd; padding: 10px 24px;
      display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
    }
    .control-label { font-size: 12px; color: #666; font-weight: 500; }
    .chip-list { display: flex; flex-wrap: wrap; gap: 5px; }
    .chip {
      background: #f0f4ff; border: 1px solid #c7d7ff; color: #2563eb;
      border-radius: 4px; padding: 3px 8px; font-size: 12px; font-weight: 500;
      display: inline-flex; align-items: center; gap: 4px;
    }
    .ticker-input {
      border: 1px solid #ddd; border-radius: 4px; padding: 4px 8px;
      font-size: 12px; width: 80px; outline: none; font-family: inherit;
    }
    .ticker-input:focus { border-color: #2563eb; }
    .btn-small {
      padding: 4px 10px; font-size: 12px; border-radius: 4px; border: 1px solid #ddd;
      background: #fff; cursor: pointer; font-family: inherit; font-weight: 500;
    }
    .btn-small:hover { background: #f5f5f5; }
    .window-group { display: flex; gap: 3px; }
    .win-btn {
      padding: 3px 9px; font-size: 12px; border: 1px solid #ddd; border-radius: 4px;
      background: #fff; cursor: pointer; font-family: inherit; color: #555;
    }
    .win-btn.active { background: #2563eb; color: #fff; border-color: #2563eb; }
    .btn-load {
      margin-left: auto; padding: 6px 16px; font-size: 13px; font-weight: 600;
      background: #2563eb; color: #fff; border: none; border-radius: 5px;
      cursor: pointer; font-family: inherit;
    }
    .btn-load:hover { background: #1d4ed8; }
    .btn-load:disabled { background: #93c5fd; cursor: not-allowed; }

    .main { padding: 20px 24px 40px; }
    .empty { text-align: center; padding: 60px 20px; color: #aaa; font-size: 13px; }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Portfolio Allocation Engine</h1>
      <span class="subtitle">Interactive Asset Analysis &amp; Optimization</span>
    </div>
    <div class="header-status">
      <div class="dot" id="statusDot"></div>
      <span id="statusText">No data loaded</span>
    </div>
  </header>

  <div class="tabs">
    <button class="tab-btn active">01 · Asset Explorer</button>
    <button class="tab-btn">02 · Risk Estimation</button>
    <button class="tab-btn">03 · Portfolio Builder</button>
  </div>

  <div class="controls-bar">
    <span class="control-label">Assets:</span>
    <div class="chip-list" id="chipList">
      <span class="chip">AAPL</span><span class="chip">MSFT</span><span class="chip">GOOGL</span>
      <span class="chip">JPM</span><span class="chip">SPY</span>
    </div>
    <input class="ticker-input" placeholder="Add ticker" maxlength="6" />
    <button class="btn-small">+ Add</button>
    <span class="control-label" style="margin-left:8px">Window:</span>
    <div class="window-group">
      <button class="win-btn">1Y</button>
      <button class="win-btn active">3Y</button>
      <button class="win-btn">5Y</button>
      <button class="win-btn">10Y</button>
    </div>
    <button class="btn-load" id="loadBtn">&#11015; Load Data</button>
  </div>

  <div class="main">
    <div class="empty">Load data using the button above to begin analysis.</div>
  </div>
</body>
</html>
